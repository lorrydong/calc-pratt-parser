<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calc · 命令行计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #e0e0e0;
      padding: 12px;
    }
    .calc {
      background: #16213e;
      border-radius: 24px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .display {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
    }
    .display .expr {
      font-size: 18px;
      color: #8899aa;
      word-break: break-all;
      text-align: right;
      width: 100%;
      min-height: 26px;
      line-height: 1.4;
    }
    .display .result {
      font-size: 36px;
      font-weight: 600;
      color: #e8f0fe;
      word-break: break-all;
      text-align: right;
      width: 100%;
      margin-top: 6px;
      transition: font-size 0.1s;
    }
    .display .result.small { font-size: 28px; }
    .display .result.xsmall { font-size: 22px; }
    .display .result.error { color: #ff6b6b; }
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #2a3a5c;
      border-radius: 10px;
      background: transparent;
      color: #8899aa;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .mode-btn.active {
      background: #0f3460;
      border-color: #4a6fa5;
      color: #e8f0fe;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .btn-grid.advanced {
      display: none;
      grid-template-columns: repeat(4, 1fr);
    }
    .btn-grid.show {
      display: grid;
    }
    .btn {
      padding: 16px 8px;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      font-family: inherit;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.93); }
    .btn.num {
      background: #1e2d50;
      color: #e0e0e0;
    }
    .btn.num:active { background: #2a3f6a; }
    .btn.op {
      background: #0f3460;
      color: #64b5f6;
    }
    .btn.op:active { background: #1a4a7a; }
    .btn.fn {
      background: #1a2350;
      color: #81c784;
      font-size: 15px;
    }
    .btn.fn:active { background: #2a3f6a; }
    .btn.equals {
      background: #1565c0;
      color: #fff;
    }
    .btn.equals:active { background: #1976d2; }
    .btn.clear {
      background: #4a1a1a;
      color: #ff8a80;
    }
    .btn.clear:active { background: #6a2a2a; }
    .btn.backspace {
      background: #2a2a3e;
      color: #e0e0e0;
    }
    .btn.backspace:active { background: #3a3a5e; }
    .btn.span2 { grid-column: span 2; }
    .btn-gap { grid-column: span 1; }
    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: #445566;
    }
    .footer a { color: #5a7a9a; text-decoration: none; }
    .btn.advanced-btn {
      background: #2a2a3e;
      color: #b0b0c0;
      font-size: 14px;
    }
    .btn.advanced-btn:active { background: #3a3a5e; }
  </style>
</head>
<body>
<div class="calc">
  <!-- Display -->
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="basic">基本</button>
    <button class="mode-btn" data-mode="advanced">科学</button>
  </div>

  <!-- Basic buttons -->
  <div class="btn-grid" id="basic-grid">
    <button class="btn clear" data-action="clear">AC</button>
    <button class="btn backspace" data-action="backspace">⌫</button>
    <button class="btn op" data-action="op" data-value="%">%</button>
    <button class="btn op" data-action="op" data-value="/">÷</button>

    <button class="btn num" data-action="num" data-value="7">7</button>
    <button class="btn num" data-action="num" data-value="8">8</button>
    <button class="btn num" data-action="num" data-value="9">9</button>
    <button class="btn op" data-action="op" data-value="*">×</button>

    <button class="btn num" data-action="num" data-value="4">4</button>
    <button class="btn num" data-action="num" data-value="5">5</button>
    <button class="btn num" data-action="num" data-value="6">6</button>
    <button class="btn op" data-action="op" data-value="-">−</button>

    <button class="btn num" data-action="num" data-value="1">1</button>
    <button class="btn num" data-action="num" data-value="2">2</button>
    <button class="btn num" data-action="num" data-value="3">3</button>
    <button class="btn op" data-action="op" data-value="+">+</button>

    <button class="btn fn" data-action="unary" data-value="neg">±</button>
    <button class="btn num" data-action="num" data-value="0">0</button>
    <button class="btn num" data-action="num" data-value=".">.</button>
    <button class="btn equals" data-action="equals">=</button>
  </div>

  <!-- Advanced buttons -->
  <div class="btn-grid advanced" id="advanced-grid">
    <button class="btn fn" data-action="func" data-value="sin">sin</button>
    <button class="btn fn" data-action="func" data-value="cos">cos</button>
    <button class="btn fn" data-action="func" data-value="tan">tan</button>
    <button class="btn fn" data-action="func" data-value="sqrt">√x</button>

    <button class="btn fn" data-action="func" data-value="log">log</button>
    <button class="btn fn" data-action="func" data-value="ln">ln</button>
    <button class="btn fn" data-action="func" data-value="abs">abs</button>
    <button class="btn fn" data-action="func" data-value="floor">⌊x⌋</button>

    <button class="btn fn" data-action="func" data-value="ceil">⌈x⌉</button>
    <button class="btn fn" data-action="func" data-value="round">round</button>
    <button class="btn fn" data-action="const" data-value="pi">π</button>
    <button class="btn fn" data-action="const" data-value="e">e</button>

    <button class="btn op" data-action="op" data-value="**">xʸ</button>
    <button class="btn op" data-action="op" data-value="//">÷÷</button>
    <button class="btn fn" data-action="postfix" data-value="!">n!</button>
    <button class="btn fn" data-action="const" data-value="tau">τ</button>
  </div>

  <div class="footer">
    <a href="https://github.com/lorrydong/calc-pratt-parser" target="_blank">lorrydong/calc-pratt-parser</a>
  </div>
</div>

<script>
// ── Pratt Parser (JavaScript port) ──────────────────────────────

const FUNCTIONS = {
  sin: Math.sin, cos: Math.cos, tan: Math.tan,
  sqrt: Math.sqrt, log: Math.log10, ln: Math.log,
  abs: Math.abs, floor: Math.floor, ceil: Math.ceil,
  round: Math.round,
};

const CONSTANTS = { pi: Math.PI, e: Math.E, tau: Math.TAU || 2 * Math.PI };

// Tokenizer
function tokenise(expr) {
  const tokens = [];
  const re = /\s*(\d+(?:\.\d*)?(?:[eE][+-]?\d+)?|[a-zA-Z_][a-zA-Z0-9_]*|[-+*/%()^!]|\.)/g;
  let m, prevWasValue = false;
  while ((m = re.exec(expr)) !== null) {
    const raw = m[1];
    if (/^\d/.test(raw) || raw === '.') {
      // number
      if (prevWasValue) tokens.push({ kind: '*', text: '*' });
      tokens.push({ kind: 'NUM', value: parseFloat(raw) });
      prevWasValue = true;
    } else if (/^[a-zA-Z]/.test(raw)) {
      // ident
      if (prevWasValue) tokens.push({ kind: '*', text: '*' });
      if (raw in CONSTANTS) {
        tokens.push({ kind: 'NUM', value: CONSTANTS[raw] });
        prevWasValue = true;
      } else if (raw in FUNCTIONS) {
        tokens.push({ kind: 'FUNC', text: raw });
        prevWasValue = false;
      } else {
        throw new Error(`未知标识符: ${raw}`);
      }
    } else {
      // operator
      const ops = {
        '+': '+', '-': '-', '*': '*', '/': '/', '%': '%',
        '(': '(', ')': ')', '!': '!', '^': 'POW', '**': 'POW', '//': '//',
      };
      // Unary minus
      if (raw === '-' && (!prevWasValue || tokens.length === 0 ||
          ['+','-','*','/','%','(','//','POW','!','UNARY'].includes(tokens[tokens.length-1].kind) ||
          tokens[tokens.length-1].kind === 'FUNC')) {
        tokens.push({ kind: 'UNARY', text: '-' });
        prevWasValue = false;
        continue;
      }
      // Implicit multiply before '('
      if (raw === '(' && prevWasValue) {
        tokens.push({ kind: '*', text: '*' });
      }
      const kind = ops[raw] || raw;
      tokens.push({ kind, text: raw });
      prevWasValue = raw === ')' || raw === '!';
      // Exponentiation
      if (raw === '^') {
        tokens[tokens.length-1] = { kind: 'POW', text: '^' };
      }
    }
  }
  return tokens;
}

// Precedence
const PREC = {
  '+': 1, '-': 1,
  '*': 2, '/': 2, '%': 2, '//': 2,
  '!': 3,
  'UNARY': 4,
  'POW': 5,
  'CALL': 6,
};
const RIGHT_ASSOC = new Set(['POW']);

class Parser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos = 0;
  }
  peek() { return this.pos < this.tokens.length ? this.tokens[this.pos] : null; }
  advance() {
    if (this.pos >= this.tokens.length) throw new Error('表达式意外结束');
    return this.tokens[this.pos++];
  }
  expect(kind) {
    const t = this.advance();
    if (t.kind !== kind) throw new Error(`期望 ${kind}，得到 ${t.kind}`);
    return t;
  }
  expr(minPrec = 0) {
    let t = this.advance();
    let left;
    // Prefix
    if (t.kind === 'NUM') {
      left = t.value;
    } else if (t.kind === '(') {
      left = this.expr(0);
      this.expect(')');
    } else if (t.kind === 'UNARY') {
      left = -this.expr(PREC['UNARY']);
    } else if (t.kind === 'FUNC') {
      const fn = t.text;
      this.expect('(');
      const arg = this.expr(0);
      this.expect(')');
      left = FUNCTIONS[fn](arg);
    } else {
      throw new Error(`意外的 token: ${t.kind}`);
    }
    // Infix
    while (this.pos < this.tokens.length) {
      const next = this.peek();
      const prec = PREC[next.kind];
      if (prec === undefined || prec <= minPrec) break;
      if (RIGHT_ASSOC.has(next.kind) && prec < PREC[next.kind]) break;
      this.advance();
      if (next.kind === '!' && next.text === '!') {
        // factorial
        if (left < 0 || left !== Math.floor(left)) throw new Error('阶乘需要非负整数');
        left = factorial_(left);
      } else if (next.kind === 'POW') {
        right = this.expr(PREC['POW'] - 1);
        left = Math.pow(left, right);
      } else if (next.kind === '//') {
        const right = this.expr(PREC['//']);
        left = Math.floor(left / right);
      } else {
        const right = this.expr(prec);
        switch (next.kind) {
          case '+': left += right; break;
          case '-': left -= right; break;
          case '*': left *= right; break;
          case '/': left /= right; break;
          case '%': left %= right; break;
        }
      }
    }
    return left;
  }
}

function factorial_(n) {
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function evaluate(expr) {
  const tokens = tokenise(expr);
  if (tokens.length === 0) return 0;
  const parser = new Parser(tokens);
  const result = parser.expr(0);
  if (parser.peek() !== null) throw new Error('表达式后有多余内容');
  return result;
}

// ── UI ──────────────────────────────────────────────────────────

const exprEl = document.getElementById('expr');
const resultEl = document.getElementById('result');
let input = '';       // raw expression string
let lastResult = null;

function display(expr, result, isError = false) {
  exprEl.textContent = expr || '';
  if (isError) {
    resultEl.textContent = result;
    resultEl.className = 'result error';
    return;
  }
  resultEl.textContent = result;
  resultEl.className = 'result';
  // Shrink font for long results
  if (result.length > 12) resultEl.classList.add('small');
  if (result.length > 18) resultEl.classList.add('xsmall');
}

function calc() {
  if (!input.trim()) {
    display('', '0');
    lastResult = null;
    return;
  }
  try {
    const result = evaluate(input);
    lastResult = result;
    display(input, fmt(result), false);
  } catch (e) {
    display(input, `错误: ${e.message}`, true);
    lastResult = null;
  }
}

function fmt(v) {
  if (!isFinite(v)) return v > 0 ? '∞' : '-∞';
  if (Number.isInteger(v) && Math.abs(v) < 1e15) return v.toString();
  const s = v.toPrecision(12);
  // Remove trailing zeros
  return parseFloat(s).toString();
}

function append(text) {
  input += text;
}

const BASIC_OPS = new Set(['+','-','*','/','%']);

// ── Button handling ─────────────────────────────────────────────

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;

    if (action === 'num') {
      const v = btn.dataset.value;
      // Prevent multiple dots
      if (v === '.') {
        const lastNum = input.split(/[\+\-\*\/%\(\)]/).pop();
        if (lastNum.includes('.')) return;
      }
      append(v);
      calc();

    } else if (action === 'op') {
      let v = btn.dataset.value;
      if (v === '×') v = '*';
      else if (v === '÷') v = '/';
      else if (v === '−') v = '-';
      // Replace trailing operator
      if (/[\+\-\*\/%\/\/\^]\s*$/.test(input)) {
        input = input.replace(/[\+\-\*\/%\/]{1,3}\s*$/, '');
      }
      append(v);
      calc();

    } else if (action === 'func') {
      const fn = btn.dataset.value;
      append(fn + '(');
      calc();

    } else if (action === 'const') {
      const c = btn.dataset.value;
      // Replace if currently showing a result
      if (/[\d.]+\s*$/.test(input) || input === '') {
        // If input ends with number, act like multiplication
        if (/\d\s*$/.test(input)) append('*');
        append(c);
      } else {
        append(c);
      }
      calc();

    } else if (action === 'unary') {
      // Toggle negative of current number
      if (input === '') {
        append('-');
      } else {
        append('-');
      }
      calc();

    } else if (action === 'postfix') {
      append('!');
      calc();

    } else if (action === 'equals') {
      calc();

    } else if (action === 'clear') {
      input = '';
      lastResult = null;
      calc();

    } else if (action === 'backspace') {
      input = input.slice(0, -1);
      calc();
    }
  });
});

// ── Mode toggle ─────────────────────────────────────────────────

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.mode;
    document.getElementById('basic-grid').classList.toggle('show', mode === 'basic');
    document.getElementById('advanced-grid').classList.toggle('show', mode === 'advanced');
  });
});

// Show basic by default
document.getElementById('basic-grid').classList.add('show');

// ── Keyboard support ────────────────────────────────────────────

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key >= '0' && key <= '9') {
    append(key); calc();
  } else if (key === '.') {
    const lastNum = input.split(/[\+\-\*\/%\(\)]/).pop();
    if (!lastNum.includes('.')) { append('.'); calc(); }
  } else if (['+', '-', '*', '/', '%'].includes(key)) {
    if (/[\+\-\*\/%]\s*$/.test(input)) input = input.slice(0, -1);
    append(key); calc();
  } else if (key === '^') {
    if (/[\^\*]\s*$/.test(input)) input = input.slice(0, -1);
    append('**'); calc();
  } else if (key === '(') { append('('); calc(); }
  else if (key === ')') { append(')'); calc(); }
  else if (key === 'Enter' || key === '=') { e.preventDefault(); calc(); }
  else if (key === 'Backspace') { input = input.slice(0, -1); calc(); }
  else if (key === 'Escape') { input = ''; lastResult = null; calc(); }
});
</script>
</body>
</html>
